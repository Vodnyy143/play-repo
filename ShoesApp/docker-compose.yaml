services:
  db:
    image: postgres:18-alpine
    container_name: db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: wpf
      PG_DATA: /var/lib/postgresql/18/docker
    volumes:
      - database-volume:/var/lib/postgresql

volumes:
  database-volume: 
      